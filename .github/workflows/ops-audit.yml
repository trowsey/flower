name: ops-audit

# Meta-quality audit. Runs every 3 days (and on-demand). Each agent
# produces a report; if there are findings, opens a PR with @trowsey
# auto-added as reviewer.
#
# See .agents/squads/ops/SQUAD.md for what each agent does and
# .agents/config/CONFIDENCE.md for the confidence rubric every PR uses.

on:
  schedule:
    # 09:00 UTC every 3 days from epoch — GitHub cron has no native
    # "every 3 days", so we run on a fixed day-of-month list and skip
    # if the last commit on this branch is fresh (set by the job).
    - cron: "0 9 1,4,7,10,13,16,19,22,25,28 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  token-auditor:
    name: token-auditor (deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install tiktoken
      - run: python3 scripts/ops/token_audit.py
      - name: Commit + open PR if report changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ops/token-audit
          commit-message: "chore(ops): refresh token audit report"
          title: "ops: token audit (every-3-days)"
          body: |
            Automated token-cost audit of `.agents/**`, `docs/**`, and root context.

            Report: `.agents/memory/ops/token-auditor/reports/latest.md`

            Confidence: **high (8/10)** — pure counting, no judgment.
          reviewers: trowsey
          assignees: trowsey
          labels: ops,squad:copilot
          add-paths: .agents/memory/ops/token-auditor/reports/

  dead-text-detector:
    name: dead-text-detector (heuristic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python3 scripts/ops/dead_text.py
      - name: Commit + open PR if report changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ops/dead-text
          commit-message: "chore(ops): refresh dead-text findings"
          title: "ops: dead-text detector findings (every-3-days)"
          body: |
            Heuristic-only pass. RELOCATE findings need human judgment
            on cold-storage target before they ship.

            Report: `.agents/memory/ops/dead-text-detector/reports/latest.md`

            Confidence: **medium-high (7/10)** — heuristic; PRUNE on
            placeholders is high (9/10), RELOCATE picks need review.
          reviewers: trowsey
          assignees: trowsey
          labels: ops,squad:copilot
          add-paths: .agents/memory/ops/dead-text-detector/reports/

  # gotcha-promoter, orchestrator-tuner, and session-summarizer require
  # an LLM call. They are wired here as no-op placeholders so the
  # cadence and PR plumbing exists; the LLM step is added once the
  # provider config is finalized in .agents/config/provider.yaml.
  llm-agents:
    name: ${{ matrix.agent }} (LLM, placeholder)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: [gotcha-promoter, orchestrator-tuner, session-summarizer]
    steps:
      - uses: actions/checkout@v4
      - name: Stub run — record cadence hit
        run: |
          mkdir -p .agents/memory/ops/${{ matrix.agent }}/reports
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "# ${{ matrix.agent }} — cadence hit"
            echo
            echo "Last cadence run: $DATE"
            echo
            echo "LLM step is stubbed pending provider wiring in"
            echo ".agents/config/provider.yaml. See SQUAD.md for the"
            echo "agent's full responsibilities."
            echo
            echo "Confidence: **very high (10/10)** — stub run, no findings claimed."
          } > .agents/memory/ops/${{ matrix.agent }}/reports/latest.md
